name: CD

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:

    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [12.x]

    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
    - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version: '16.x'
        registry-url: 'https://registry.npmjs.org'
    - name: Install
      run: |
        npm install
    - run: npm ci
    - run: npm publish
      env:
        NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
    - name: get-npm-version
      id: package-version
      uses: martinbeentjes/npm-get-version-action@3cf273023a0dda27efcd3164bdfb51908dd46a5b # v1.3.1
    - name: Slack Notification
      uses: rtCamp/action-slack-notify@e31e87e03dd19038e411e38ae27cbad084a90661 # v2.3.3
      env:
        SLACK_WEBHOOK: ${{ secrets.SLACK_NPM_PUBLISH_WEBHOOK }}
        SLACK_TITLE: "New version of eslint-plugin-lendi has been published: ${{steps.package-version.outputs.current-version}}"
    - name: Report Status
      if: always()
      uses: ravsamhq/notify-slack-action@4ed28566c2bdcdaee6dca2b46b9666d01b4ed8a4 # v1.10.0
      with:
        status: ${{ job.status }}
        notification_title: 'eslint-plugin-lendi ${{steps.package-version.outputs.current-version}} has failed.'
        notify_when: 'failure'
      env:
        SLACK_WEBHOOK_URL: ${{ secrets.SLACK_NPM_PUBLISH_WEBHOOK }}